<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boulder Construction — Schedule Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app">
  <!-- Sidebar (loaded from partial) -->
  <div id="shell-sidebar"></div>

  <!-- MAIN -->
  <div class="main">
    <!-- Header (loaded from partial) -->
    <div id="shell-header"></div>

    <!-- CONTENT -->
    <div class="content">
      <div class="schedule-area" id="scheduleArea">
        <!-- Dynamic view content injected by JS -->
      </div>

      <!-- Detail Panel (loaded from partial) -->
      <div id="shell-detail"></div>
    </div>
  </div>
</div>

<!-- Modal (loaded from partial) -->
<div id="shell-modal"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Hidden import input (Fix #6) -->
<input type="file" id="importInput" accept=".json" style="display:none;" onchange="importJSON(this)">

<!-- JS MODULES (load order matters) -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="js/helpers.js"></script>
<script src="js/data.js"></script>
<script src="js/renderers.js"></script>
<script src="js/gantt-d3.js"></script>
<script src="js/detail.js"></script>
<script src="js/modal.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/page-loader.js"></script>
<script>loadShell();</script>
</body>
</html>
